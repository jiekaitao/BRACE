syntax = "proto3";

package vdss;

import "vdss_types.proto";

service VDSSService {
  rpc CreateCollection(CreateCollectionRequest) returns (CreateCollectionResponse);
  rpc OpenCollection(OpenCollectionRequest) returns (OpenCollectionResponse);
  rpc CloseCollection(CloseCollectionRequest) returns (CloseCollectionResponse);
  rpc DeleteCollection(DeleteCollectionRequest) returns (DeleteCollectionResponse);
  rpc UpsertVector(UpsertVectorRequest) returns (UpsertVectorResponse);
  rpc DeleteVector(DeleteVectorRequest) returns (DeleteVectorResponse);
  rpc GetVector(GetVectorRequest) returns (GetVectorResponse);
  rpc BatchUpsert(BatchUpsertRequest) returns (BatchUpsertResponse);
  rpc BatchDelete(BatchDeleteRequest) returns (BatchDeleteResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc SaveSnapshot(SaveSnapshotRequest) returns (SaveSnapshotResponse);
  rpc LoadSnapshot(LoadSnapshotRequest) returns (LoadSnapshotResponse);
  rpc GetState(GetStateRequest) returns (GetStateResponse);
  rpc GetVectorCount(GetVectorCountRequest) returns (GetVectorCountResponse);
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
  rpc Flush(FlushRequest) returns (FlushResponse);
  rpc RebuildIndex(RebuildIndexRequest) returns (RebuildIndexResponse);
  rpc Optimize(OptimizeRequest) returns (OptimizeResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message CreateCollectionRequest {
  string collection_name = 1;
  CollectionConfig config = 2;
}
message CreateCollectionResponse {
  Status status = 1;
}

message OpenCollectionRequest {
  string collection_name = 1;
}
message OpenCollectionResponse {
  Status status = 1;
}

message CloseCollectionRequest {
  string collection_name = 1;
}
message CloseCollectionResponse {
  Status status = 1;
}

message DeleteCollectionRequest {
  string collection_name = 1;
}
message DeleteCollectionResponse {
  Status status = 1;
}

message UpsertVectorRequest {
  string collection_name = 1;
  VectorIdentifier vector_id = 2;
  Vector vector = 3;
  Payload payload = 4;
}
message UpsertVectorResponse {
  Status status = 1;
}

message DeleteVectorRequest {
  string collection_name = 1;
  VectorIdentifier vector_id = 2;
}
message DeleteVectorResponse {
  Status status = 1;
}

message GetVectorRequest {
  string collection_name = 1;
  VectorIdentifier vector_id = 2;
}
message GetVectorResponse {
  Status status = 1;
  Vector vector = 2;
  Payload payload = 3;
}

message BatchUpsertRequest {
  string collection_name = 1;
  repeated VectorIdentifier vector_ids = 2;
  repeated Vector vectors = 3;
  repeated Payload payloads = 4;
}
message BatchUpsertResponse {
  Status status = 1;
}

message BatchDeleteRequest {
  string collection_name = 1;
  repeated VectorIdentifier vector_ids = 2;
}
message BatchDeleteResponse {
  Status status = 1;
}

message SearchRequest {
  string collection_name = 1;
  Vector query = 2;
  uint32 top_k = 3;
  string filter_json = 4;
  bool with_vector = 5;
  bool with_payload = 6;
}
message SearchResponse {
  Status status = 1;
  repeated SearchResult results = 2;
}

message SaveSnapshotRequest {
  string collection_name = 1;
}
message SaveSnapshotResponse {
  Status status = 1;
}

message LoadSnapshotRequest {
  string collection_name = 1;
}
message LoadSnapshotResponse {
  Status status = 1;
}

message GetStateRequest {
  string collection_name = 1;
}
message GetStateResponse {
  Status status = 1;
  CollectionState state = 2;
}

message GetVectorCountRequest {
  string collection_name = 1;
}
message GetVectorCountResponse {
  Status status = 1;
  int32 count = 2;
}

message GetStatsRequest {
  string collection_name = 1;
}
message GetStatsResponse {
  Status status = 1;
  CollectionStats stats = 2;
}

message FlushRequest {
  string collection_name = 1;
}
message FlushResponse {
  Status status = 1;
}

message RebuildIndexRequest {
  string collection_name = 1;
}
message RebuildIndexResponse {
  Status status = 1;
}

message OptimizeRequest {
  string collection_name = 1;
}
message OptimizeResponse {
  Status status = 1;
}

message HealthCheckRequest {}
message HealthCheckResponse {
  Status status = 1;
  string version = 2;
  int32 uptime_seconds = 3;
}
