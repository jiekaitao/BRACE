services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  mongo:
    image: mongo:7.0
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8000"
    environment:
      - PIPELINE_BACKEND=advanced
      - GOOGLE_GEMINI_API_KEY=${GOOGLE_GEMINI_API_KEY:-AIzaSyDrfeCSYbecPiJ1aLWUlY9MdGDBA96__W8}
      - MONGODB_URI=mongodb://mongo:27017/brace
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
    depends_on:
      - mongo
    volumes:
      - uploads:/app/uploads
      - ./data/sports_videos:/app/data/sports_videos:ro
      - ./backend/main.py:/app/main.py:ro
      - ./backend/streaming_analyzer.py:/app/streaming_analyzer.py:ro
      - ./backend/subject_manager.py:/app/subject_manager.py:ro
      - ./backend/gemini_classifier.py:/app/gemini_classifier.py:ro
      - ./backend/tensorrt_utils.py:/app/tensorrt_utils.py:ro
      - ./backend/identity_resolver.py:/app/identity_resolver.py:ro
      - ./backend/multi_person_tracker.py:/app/multi_person_tracker.py:ro
      - ./backend/botsort_tracker.py:/app/botsort_tracker.py:ro
      - ./backend/movement_quality.py:/app/movement_quality.py:ro
      - ./backend/movement_guidelines.py:/app/movement_guidelines.py:ro
      - ./backend/db.py:/app/db.py:ro
      - ./backend/auth.py:/app/auth.py:ro
      - ./backend/risk_profile.py:/app/risk_profile.py:ro
      - ./backend/chat_agent.py:/app/chat_agent.py:ro
      - ./backend/voice_alerts.py:/app/voice_alerts.py:ro
      - ./brace/core/motion_segments.py:/app/brace/core/motion_segments.py:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  uploads:
  mongodb_data:
