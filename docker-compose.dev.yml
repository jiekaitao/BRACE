services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_WS_URL: ws://100.115.158.50:8001
        NEXT_PUBLIC_API_URL: http://100.115.158.50:8001
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - ./brace:/app/brace
      - uploads:/app/uploads
      - ./data/sports_videos:/app/data/sports_videos:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  uploads:
